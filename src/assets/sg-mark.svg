<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200" aria-labelledby="title desc">
  <title id="title">SG compact mark</title>
  <desc id="desc">Compact square mark combining S and G for favicon or avatar use.</desc>
  <defs>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0" stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#6A00FF"/>
    </linearGradient>
  </defs>

  <rect width="100" height="100" rx="18" fill="url(#g2)"/>

  <g fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" transform="translate(8,8)">
    <!-- simplified S -->
    <path d="M8 24 C8 14,30 14,30 24 C30 34,8 34,8 44" />
    <!-- G as partial circle -->
    <path d="M66 24 A18 18 0 1 0 66 60" />
    <path d="M54 42 L66 42" stroke="#fff" stroke-width="6"/>
  </g>
</svg>
