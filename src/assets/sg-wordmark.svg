<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="1200" height="240" aria-labelledby="title desc">
  <title id="title">SG wordmark</title>
  <desc id="desc">Compact logo combining gold mark with 'SAI GANESH' wordmark.</desc>
  <defs>
    <linearGradient id="wmGold" x1="0" x2="1">
      <stop offset="0" stop-color="#f6e27a"/>
      <stop offset="1" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="transparent"/>

  <g transform="translate(24,12)">
    <!-- compact rounded square mark -->
    <rect width="96" height="96" rx="18" fill="url(#wmGold)" stroke="#6f4a00" stroke-width="2"/>
    <g transform="translate(14,12)" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 24 C8 14,30 14,30 24 C30 34,8 34,8 44"/>
      <path d="M66 24 A18 18 0 1 0 66 60"/>
      <path d="M54 42 L66 42" stroke="#fff" stroke-width="8"/>
    </g>

    <!-- divider -->
    <rect x="136" y="22" width="2" height="56" fill="#b8860b" opacity="0.9" rx="1"/>

    <!-- wordmark text (SVG text for accuracy) -->
    <g transform="translate(156,30)" fill="#f3d68a">
      <text x="0" y="34" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="36">SAI GANESH</text>
    </g>
  </g>
</svg>
