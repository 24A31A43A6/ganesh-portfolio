<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="600" height="300" aria-labelledby="title desc">
  <title id="title">SG monogram</title>
  <desc id="desc">Stylized overlapping S and G with a vibrant gradient.</desc>
  <defs>
    <linearGradient id="grad" x1="0" x2="1">
      <stop offset="0" stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#6A00FF"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="transparent"/>

  <g transform="translate(0,0)" fill="none" stroke="url(#grad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <!-- Stylized S -->
    <path d="M30 25 C30 10,70 10,70 25 C70 40,30 40,30 55 C30 70,70 70,70 55" />

    <!-- Stylized G: circle with small inward stroke to form the G shape -->
    <circle cx="140" cy="50" r="30" />
    <path d="M145 50 L130 50" stroke="url(#grad)" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Soft drop shadow for depth -->
  <g opacity="0.12" transform="translate(4,6)">
    <path d="M30 25 C30 10,70 10,70 25 C70 40,30 40,30 55 C30 70,70 70,70 55" fill="none" stroke="#000" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="140" cy="50" r="30" fill="none" stroke="#000" stroke-width="10"/>
  </g>
</svg>
